name: FDA Supply Chain Pipeline

on:
  schedule:
    - cron: '0 6 * * *'    # daily at 6am UTC
  workflow_dispatch:         # manual trigger button

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install uv
          uv sync

      - name: Run ingestion scripts
        env:
          FDA_BASE_URL: ${{ secrets.FDA_BASE_URL }}
          FDA_API_KEY: ${{ secrets.FDA_API_KEY }}
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_PORT: ${{ secrets.DB_PORT }}
          DB_NAME: ${{ secrets.DB_NAME }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
        run: |
          python ingestion/fda_shortages.py
          python ingestion/fda_recalls.py
          python ingestion/fda_approvals.py

      - name: Run dbt
        env:
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_PORT: ${{ secrets.DB_PORT }}
          DB_NAME: ${{ secrets.DB_NAME }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
        run: |
          cd FDA_Pipeline
          uv run dbt run --profiles-dir .
          uv run dbt test --profiles-dir .
